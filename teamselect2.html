<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }
  #container {
    text-align: center;
    width: 100%;
    max-width: 450px;
    padding: 20px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }
  .subtitle {
    font-size: 11px;
    color: #888;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .teams {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .team-btn {
    flex: 1;
    max-width: 130px;
    padding: 16px 10px;
    border: 2px solid #333;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .team-btn:hover {
    transform: translateY(-2px);
  }
  .team-btn.red { border-color: #ff3333; }
  .team-btn.red:hover, .team-btn.red.selected {
    background: rgba(255,51,51,0.2);
    box-shadow: 0 0 20px rgba(255,51,51,0.3);
  }
  .team-btn.blue { border-color: #3388ff; }
  .team-btn.blue:hover, .team-btn.blue.selected {
    background: rgba(51,136,255,0.2);
    box-shadow: 0 0 20px rgba(51,136,255,0.3);
  }
  .team-btn.random { border-color: #aa55ff; }
  .team-btn.random:hover, .team-btn.random.selected {
    background: rgba(170,85,255,0.2);
    box-shadow: 0 0 20px rgba(170,85,255,0.3);
  }
  .team-btn .icon { font-size: 28px; margin-bottom: 6px; }
  .team-btn .name {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .team-btn.red .name { color: #ff3333; }
  .team-btn.blue .name { color: #3388ff; }
  .team-btn.random .name { color: #aa55ff; }

  #readyBtn {
    width: 80%;
    max-width: 280px;
    padding: 16px;
    border: 2px solid #00ff88;
    border-radius: 10px;
    background: rgba(0,255,136,0.1);
    color: #00ff88;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
  #readyBtn:hover {
    background: rgba(0,255,136,0.2);
    box-shadow: 0 0 25px rgba(0,255,136,0.4);
    transform: translateY(-2px);
  }
  #readyBtn:disabled {
    border-color: #555;
    color: #555;
    background: rgba(255,255,255,0.02);
    cursor: default;
    text-shadow: none;
    box-shadow: none;
    transform: none;
  }

  #status {
    margin-top: 20px;
    font-size: 14px;
    color: #888;
    letter-spacing: 1px;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .pulsing { animation: pulse 1.5s ease-in-out infinite; }
  #debug {
    position: fixed;
    bottom: 5px;
    left: 5px;
    font-size: 9px;
    color: #444;
  }
</style>
</head>
<body>
  <div id="container">
    <div id="pickPhase">
      <h1>Choose Team</h1>
      <div class="subtitle">Pick a side and ready up</div>
      <div class="teams">
        <div class="team-btn red" onclick="pickTeam('red')">
          <div class="icon">&#9876;</div>
          <div class="name">Red</div>
        </div>
        <div class="team-btn random" onclick="pickTeam('random')">
          <div class="icon">&#9733;</div>
          <div class="name">Random</div>
        </div>
        <div class="team-btn blue" onclick="pickTeam('blue')">
          <div class="icon">&#9876;</div>
          <div class="name">Blue</div>
        </div>
      </div>
      <button id="readyBtn" disabled onclick="goReady()">Ready</button>
      <div id="status"></div>
    </div>
  </div>
  <div id="debug"></div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var selectedTeam = '';
    var isReady = false;
    var dbg = document.getElementById('debug');

    function pickTeam(team) {
      if (isReady) return;
      selectedTeam = team;
      var btns = document.querySelectorAll('.team-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
      document.querySelector('.team-btn.' + team).classList.add('selected');
      document.getElementById('readyBtn').disabled = false;
    }

    function goReady() {
      if (!selectedTeam || isReady) return;
      isReady = true;
      document.getElementById('readyBtn').disabled = true;
      document.getElementById('readyBtn').textContent = 'READY!';
      document.getElementById('readyBtn').style.borderColor = '#00ff88';
      document.getElementById('readyBtn').style.color = '#00ff88';
      document.getElementById('readyBtn').style.background = 'rgba(0,255,136,0.15)';
      document.getElementById('status').textContent = 'Waiting for others...';
      document.getElementById('status').classList.add('pulsing');

      var taskMap = { red: 'joinRed', blue: 'joinBlue', random: 'joinRandom' };
      var teamTask = taskMap[selectedTeam];
      var teamMsg = JSON.stringify({
        TaskName: teamTask,
        TaskTargetState: 'SetAnyToActive'
      });
      dbg.textContent = 'sent: ' + teamTask;
      PortalsSdk.sendMessageToUnity(teamMsg);

      setTimeout(function() {
        PortalsSdk.closeIframe();
      }, 500);
    }

    if (typeof PortalsSdk !== 'undefined') {
      PortalsSdk.focusGameKeyboard();
    }
  </script>
</body>
</html>
