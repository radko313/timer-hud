<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>N</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
</head>
<body style="margin:0;background:transparent;">
<script>
var WORKER_URL = "https://portals-discord-notifier.bongiornomordo.workers.dev";
var sent = false;

function sendNotify(name) {
  if (sent) return;
  sent = true;
  fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ playerName: name, roomName: "Test Room" })
  }).catch(function(e) { console.error(e); });
}

PortalsSdk.setMessageListener(function(msg) {
  var name = "Someone";
  try {
    if (msg && msg.includes && msg.includes("=")) {
      var match = msg.match(/"([^"]+)"="([^"]+)"/);
      if (match) name = match[2];
    } else if (msg) {
      name = String(msg).replace(/["{}\s]/g, "") || "Someone";
    }
  } catch(e) {}
  sendNotify(name);
});

setTimeout(function() { sendNotify("Someone"); }, 5000);
</script>
</body>
</html>
