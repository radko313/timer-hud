<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }

  /* Connect Wallet Button */
  #connect-btn {
    background: linear-gradient(135deg, #7c5cfc, #00d4ff);
    color: #fff;
    border: none;
    padding: 16px 40px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(124, 92, 252, 0.4);
  }
  #connect-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 32px rgba(124, 92, 252, 0.6);
  }
  #connect-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Status text */
  #status {
    color: #aaa;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
  }

  /* Tier Badge */
  #tier-badge {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.5s ease;
  }

  #tier-badge .tier-name {
    font-size: 48px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  #tier-badge .pnl-value {
    font-size: 20px;
    font-weight: 600;
    color: #ccc;
  }

  #tier-badge .tier-msg {
    font-size: 14px;
    color: #888;
    margin-top: 4px;
  }

  /* Tier colors */
  .tier-bronze .tier-name {
    color: #cd7f32;
    text-shadow: 0 0 20px rgba(205, 127, 50, 0.6), 0 0 40px rgba(205, 127, 50, 0.3);
  }
  .tier-silver .tier-name {
    color: #c0c0c0;
    text-shadow: 0 0 20px rgba(192, 192, 192, 0.6), 0 0 40px rgba(192, 192, 192, 0.3);
  }
  .tier-gold .tier-name {
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
  }
  .tier-none .tier-name {
    color: #666;
    font-size: 24px;
  }

  /* Loading spinner */
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #7c5cfc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  .fade-out {
    animation: fadeOut 1s ease forwards;
  }
</style>
</head>
<body>
  <div id="container">
    <button id="connect-btn">Verify Wallet</button>
    <div id="status"></div>
    <div id="tier-badge">
      <div class="tier-name"></div>
      <div class="pnl-value"></div>
      <div class="tier-msg"></div>
    </div>
  </div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    // === CONFIG ===
    var WORKER_URL = 'https://portals-pnl-checker.portals-pnl.workers.dev';

    var connectBtn = document.getElementById('connect-btn');
    var statusEl = document.getElementById('status');
    var tierBadge = document.getElementById('tier-badge');
    var container = document.getElementById('container');

    // Check if Phantom is available
    function getProvider() {
      if (window.solana && window.solana.isPhantom) return window.solana;
      if (window.phantom && window.phantom.solana) return window.phantom.solana;
      return null;
    }

    connectBtn.addEventListener('click', async function() {
      connectBtn.disabled = true;

      var provider = getProvider();

      if (!provider) {
        statusEl.textContent = 'Phantom wallet not found. Please install Phantom.';
        connectBtn.disabled = false;
        return;
      }

      try {
        // Connect wallet
        statusEl.textContent = 'Connecting wallet...';
        var resp = await provider.connect();
        var walletAddress = resp.publicKey.toString();
        statusEl.textContent = 'Wallet connected: ' + walletAddress.slice(0, 4) + '...' + walletAddress.slice(-4);

        // Show loading
        connectBtn.style.display = 'none';
        statusEl.innerHTML = '<div class="spinner" style="margin: 0 auto;"></div><br>Checking your PnL...';

        // Call worker
        var result = await checkPnL(walletAddress);

        if (!result.ok) {
          statusEl.textContent = 'Error: ' + (result.error || 'Unknown error');
          connectBtn.style.display = 'block';
          connectBtn.disabled = false;
          return;
        }

        // Show tier result
        showTier(result);

        // Send task to Portals after brief display
        setTimeout(function() {
          sendTeleportTask(result.tier);
          // Fade out
          container.classList.add('fade-out');
        }, 2500);

      } catch (e) {
        statusEl.textContent = 'Connection cancelled or failed.';
        connectBtn.disabled = false;
      }
    });

    async function checkPnL(walletAddress) {
      try {
        var res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ walletAddress: walletAddress }),
        });
        return await res.json();
      } catch (e) {
        return { ok: false, error: 'Network error: ' + e.message };
      }
    }

    function showTier(result) {
      statusEl.textContent = '';

      var tierName = tierBadge.querySelector('.tier-name');
      var pnlValue = tierBadge.querySelector('.pnl-value');
      var tierMsg = tierBadge.querySelector('.tier-msg');

      tierBadge.className = '';

      if (result.tier === 'gold') {
        tierBadge.classList.add('tier-gold');
        tierName.textContent = 'GOLD';
        tierMsg.textContent = 'Welcome to the Gold Lounge';
      } else if (result.tier === 'silver') {
        tierBadge.classList.add('tier-silver');
        tierName.textContent = 'SILVER';
        tierMsg.textContent = 'Welcome to the Silver Lounge';
      } else if (result.tier === 'bronze') {
        tierBadge.classList.add('tier-bronze');
        tierName.textContent = 'BRONZE';
        tierMsg.textContent = 'Welcome to the Bronze Lounge';
      } else {
        tierBadge.classList.add('tier-none');
        tierName.textContent = 'NOT QUALIFIED';
        tierMsg.textContent = 'Keep trading to unlock private rooms!';
      }

      pnlValue.textContent = 'Daily PnL: $' + (result.pnlUsd || 0).toFixed(2);
      tierBadge.style.display = 'flex';
    }

    function sendTeleportTask(tier) {
      var taskName;
      if (tier === 'gold') taskName = 'TeleportGold';
      else if (tier === 'silver') taskName = 'TeleportSilver';
      else if (tier === 'bronze') taskName = 'TeleportBronze';
      else taskName = 'NoTier';

      try {
        PortalsSdk.sendMessageToUnity(JSON.stringify({
          TaskName: taskName,
          TaskTargetState: 'SetNotActiveToActive'
        }));
      } catch (e) {
        // SDK not available (testing outside Portals)
        console.log('Would send task:', taskName);
      }
    }

    // Listen for messages from Portals (e.g. "check_pnl" trigger)
    try {
      PortalsSdk.setMessageListener(function(msg) {
        if (msg === 'check_pnl') {
          // Auto-trigger if wallet already connected
          var provider = getProvider();
          if (provider && provider.isConnected) {
            connectBtn.click();
          }
        }
      });
    } catch (e) {
      // SDK not available
    }
  </script>
</body>
</html>
