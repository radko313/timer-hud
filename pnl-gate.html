<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    background: rgba(0, 0, 0, 0.85);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }

  #title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #7c5cfc, #00d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
  }

  /* Wallet Input */
  #wallet-input {
    width: 380px;
    padding: 14px 18px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    background: #16161e;
    border: 1px solid #2a2a3e;
    border-radius: 10px;
    color: #e0e0e8;
    outline: none;
    transition: border-color 0.2s;
  }
  #wallet-input:focus {
    border-color: #7c5cfc;
  }
  #wallet-input::placeholder {
    color: #444;
  }

  /* Check Button */
  #check-btn {
    background: linear-gradient(135deg, #7c5cfc, #00d4ff);
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(124, 92, 252, 0.4);
  }
  #check-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 32px rgba(124, 92, 252, 0.6);
  }
  #check-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Status text */
  #status {
    color: #aaa;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
  }

  #input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* Tier Badge */
  #tier-badge {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.5s ease;
  }

  #tier-badge .tier-name {
    font-size: 48px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  #tier-badge .pnl-value {
    font-size: 20px;
    font-weight: 600;
    color: #ccc;
  }

  #tier-badge .tier-msg {
    font-size: 14px;
    color: #888;
    margin-top: 4px;
  }

  /* Tier colors */
  .tier-bronze .tier-name {
    color: #cd7f32;
    text-shadow: 0 0 20px rgba(205, 127, 50, 0.6), 0 0 40px rgba(205, 127, 50, 0.3);
  }
  .tier-silver .tier-name {
    color: #c0c0c0;
    text-shadow: 0 0 20px rgba(192, 192, 192, 0.6), 0 0 40px rgba(192, 192, 192, 0.3);
  }
  .tier-gold .tier-name {
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
  }
  .tier-none .tier-name {
    color: #666;
    font-size: 24px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #7c5cfc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  .fade-out { animation: fadeOut 1s ease forwards; }
</style>
</head>
<body>
  <div id="container">
    <div id="title">PnL Gate</div>
    <div id="subtitle">Paste your Solana wallet to check your trading tier</div>
    <div id="input-group">
      <input id="wallet-input" type="text" placeholder="Paste your Solana wallet address..." spellcheck="false" autocomplete="off" />
      <button id="check-btn">Check PnL</button>
    </div>
    <div id="status"></div>
    <div id="tier-badge">
      <div class="tier-name"></div>
      <div class="pnl-value"></div>
      <div class="tier-msg"></div>
    </div>
  </div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var WORKER_URL = 'https://portals-pnl-checker.portals-pnl.workers.dev';

    var walletInput = document.getElementById('wallet-input');
    var checkBtn = document.getElementById('check-btn');
    var statusEl = document.getElementById('status');
    var tierBadge = document.getElementById('tier-badge');
    var inputGroup = document.getElementById('input-group');
    var container = document.getElementById('container');

    checkBtn.addEventListener('click', async function() {
      var walletAddress = walletInput.value.trim();

      if (!walletAddress || walletAddress.length < 32 || walletAddress.length > 44) {
        statusEl.textContent = 'Please enter a valid Solana wallet address.';
        return;
      }

      checkBtn.disabled = true;
      inputGroup.style.display = 'none';
      statusEl.innerHTML = '<div class="spinner"></div><br>Checking your PnL...';

      var result = await checkPnL(walletAddress);

      if (!result.ok) {
        statusEl.textContent = 'Error: ' + (result.error || 'Unknown error');
        inputGroup.style.display = 'flex';
        checkBtn.disabled = false;
        return;
      }

      showTier(result);

      setTimeout(function() {
        sendTeleportTask(result.tier);
        container.classList.add('fade-out');
      }, 2500);
    });

    walletInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkBtn.click();
    });

    async function checkPnL(walletAddress) {
      try {
        var res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ walletAddress: walletAddress }),
        });
        return await res.json();
      } catch (e) {
        return { ok: false, error: 'Network error: ' + e.message };
      }
    }

    function showTier(result) {
      statusEl.textContent = '';

      var tierName = tierBadge.querySelector('.tier-name');
      var pnlValue = tierBadge.querySelector('.pnl-value');
      var tierMsg = tierBadge.querySelector('.tier-msg');

      tierBadge.className = '';

      if (result.tier === 'gold') {
        tierBadge.classList.add('tier-gold');
        tierName.textContent = 'GOLD';
        tierMsg.textContent = 'Welcome to the Gold Lounge';
      } else if (result.tier === 'silver') {
        tierBadge.classList.add('tier-silver');
        tierName.textContent = 'SILVER';
        tierMsg.textContent = 'Welcome to the Silver Lounge';
      } else if (result.tier === 'bronze') {
        tierBadge.classList.add('tier-bronze');
        tierName.textContent = 'BRONZE';
        tierMsg.textContent = 'Welcome to the Bronze Lounge';
      } else {
        tierBadge.classList.add('tier-none');
        tierName.textContent = 'NOT QUALIFIED';
        tierMsg.textContent = 'Keep trading to unlock private rooms!';
      }

      pnlValue.textContent = 'Daily PnL: $' + (result.pnlUsd || 0).toFixed(2);
      tierBadge.style.display = 'flex';
    }

    function sendTeleportTask(tier) {
      var taskName;
      if (tier === 'gold') taskName = 'TeleportGold';
      else if (tier === 'silver') taskName = 'TeleportSilver';
      else if (tier === 'bronze') taskName = 'TeleportBronze';
      else taskName = 'NoTier';

      try {
        PortalsSdk.sendMessageToUnity(JSON.stringify({
          TaskName: taskName,
          TaskTargetState: 'SetNotActiveToActive'
        }));
      } catch (e) {
        console.log('Would send task:', taskName);
      }
    }

    // Listen for messages from Portals
    try {
      PortalsSdk.setMessageListener(function(msg) {
        if (msg === 'check_pnl') {
          // If wallet already entered, auto-check
          if (walletInput.value.trim().length >= 32) {
            checkBtn.click();
          }
        }
      });
    } catch (e) {}
  </script>
</body>
</html>
