<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    user-select: none;
    -webkit-user-select: none;
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  #timer {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-shadow:
      0 0 7px #00ff88,
      0 0 15px #00ff88,
      0 0 30px #00cc66;
    text-align: center;
    line-height: 1;
    transition: opacity 0.5s;
  }
  #debug {
    position: fixed;
    bottom: 0;
    left: 0;
    background: rgba(0,0,0,0.8);
    color: lime;
    font-family: monospace;
    font-size: 10px;
    padding: 2px 4px;
    z-index: 9999;
    max-width: 300px;
    word-break: break-all;
  }
</style>
</head>
<body>
  <div id="timer">0:45</div>
  <div id="debug">waiting...</div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var timerEl = document.getElementById('timer');
    var debugEl = document.getElementById('debug');
    var remaining = 45;
    var roundDuration = 45;

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function format(secs) {
      var m = Math.floor(secs / 60);
      var s = secs % 60;
      return m + ':' + pad(s);
    }

    function updateStyle() {
      if (remaining <= 10) {
        timerEl.style.color = '#ff3333';
        timerEl.style.textShadow = '0 0 7px #ff3333, 0 0 15px #ff3333, 0 0 30px #cc0000';
      } else if (remaining <= 20) {
        timerEl.style.color = '#ffcc00';
        timerEl.style.textShadow = '0 0 7px #ffcc00, 0 0 15px #ffcc00, 0 0 30px #cc9900';
      } else {
        timerEl.style.color = '#00ff88';
        timerEl.style.textShadow = '0 0 7px #00ff88, 0 0 15px #00ff88, 0 0 30px #00cc66';
      }
    }

    function tick() {
      remaining--;

      if (remaining <= 0) {
        clearInterval(interval);
        timerEl.textContent = 'ROUND OVER';
        timerEl.style.fontSize = '24px';
        timerEl.style.color = '#ff3333';
        timerEl.style.textShadow = '0 0 7px #ff3333, 0 0 15px #ff3333, 0 0 30px #cc0000';
        setTimeout(function() {
          timerEl.style.opacity = '0';
        }, 2000);
        return;
      }

      timerEl.textContent = format(remaining);
      updateStyle();
    }

    var interval = setInterval(tick, 1000);

    // Listen for ALL messages from Portals - debug everything
    PortalsSdk.setMessageListener(function(message) {
      var raw = typeof message === 'string' ? message : JSON.stringify(message);
      debugEl.textContent = 'MSG: ' + raw.substring(0, 200);
      console.log('[round.html] Raw message:', raw);

      // Try to find sync_ in the message
      var syncIdx = raw.indexOf('sync_');
      if (syncIdx >= 0) {
        var after = raw.substring(syncIdx + 5);
        var elapsed = parseFloat(after);
        debugEl.textContent = 'SYNC raw=' + after.substring(0,50) + ' parsed=' + elapsed;
        console.log('[round.html] Sync after=', after, 'elapsed=', elapsed);

        if (!isNaN(elapsed) && elapsed >= 0 && elapsed <= roundDuration) {
          remaining = Math.max(roundDuration - Math.floor(elapsed), 0);
          timerEl.style.fontSize = '28px';
          timerEl.style.opacity = '1';
          timerEl.textContent = format(remaining);
          updateStyle();
          clearInterval(interval);
          interval = setInterval(tick, 1000);
          debugEl.textContent = 'SYNCED to ' + remaining + 's remaining';
        }
      }
    });
  </script>
</body>
</html>
