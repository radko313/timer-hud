<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    user-select: none;
    -webkit-user-select: none;
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  #timer {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-shadow:
      0 0 7px #00ff88,
      0 0 15px #00ff88,
      0 0 30px #00cc66;
    text-align: center;
    line-height: 1;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
  <div id="timer">1:30</div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var timerEl = document.getElementById('timer');
    var remaining = 90;
    var roundDuration = 90;

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function format(secs) {
      var m = Math.floor(secs / 60);
      var s = secs % 60;
      return m + ':' + pad(s);
    }

    function updateStyle() {
      if (remaining <= 10) {
        timerEl.style.color = '#ff3333';
        timerEl.style.textShadow = '0 0 7px #ff3333, 0 0 15px #ff3333, 0 0 30px #cc0000';
      } else if (remaining <= 20) {
        timerEl.style.color = '#ffcc00';
        timerEl.style.textShadow = '0 0 7px #ffcc00, 0 0 15px #ffcc00, 0 0 30px #cc9900';
      } else {
        timerEl.style.color = '#00ff88';
        timerEl.style.textShadow = '0 0 7px #00ff88, 0 0 15px #00ff88, 0 0 30px #00cc66';
      }
    }

    function tick() {
      remaining--;
      if (remaining <= 0) {
        clearInterval(interval);
        timerEl.textContent = 'ROUND OVER';
        timerEl.style.fontSize = '24px';
        timerEl.style.color = '#ff3333';
        timerEl.style.textShadow = '0 0 7px #ff3333, 0 0 15px #ff3333, 0 0 30px #cc0000';
        setTimeout(function() { timerEl.style.opacity = '0'; }, 2000);
        return;
      }
      timerEl.textContent = format(remaining);
      updateStyle();
    }

    var interval = setInterval(tick, 1000);

    PortalsSdk.setMessageListener(function(message) {
      var msg = typeof message === 'string' ? message : JSON.stringify(message);
      if (msg.indexOf('sync_') === 0) {
        var startTime = parseFloat(msg.substring(5));
        if (!isNaN(startTime) && startTime > 1000000000) {
          // It's a Unix timestamp of when round started
          var elapsed = (Date.now() / 1000) - startTime;
          var newRemaining = Math.max(Math.floor(roundDuration - elapsed), 0);
          if (newRemaining > 0 && newRemaining < roundDuration) {
            remaining = newRemaining;
            clearInterval(interval);
            interval = setInterval(tick, 1000);
            timerEl.style.opacity = '1';
            timerEl.style.fontSize = '28px';
            timerEl.textContent = format(remaining);
            updateStyle();
          }
        }
      }
    });
  </script>
</body>
</html>
