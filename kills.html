<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  #kills {
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 6px 20px;
    border-radius: 4px;
    border-left: 3px solid #ff3333;
  }
  .row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #killCount {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .pop {
    animation: pop 0.3s ease-out;
  }
</style>
</head>
<body>
  <div id="kills">
    <div class="row">
      <div id="killCount">0</div>
      <div class="label">kills</div>
    </div>
  </div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var killCountEl = document.getElementById('killCount');

    PortalsSdk.setMessageListener(function(message) {
      var parts = message.split(':');
      if (parts[0] === 'kills') {
        killCountEl.textContent = parts[1];
        killCountEl.classList.remove('pop');
        void killCountEl.offsetWidth;
        killCountEl.classList.add('pop');
      }
    });
  </script>
</body>
</html>
