<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.hud{
  background:rgba(10,22,40,0.92);
  border:1px solid rgba(0,212,255,0.3);
  border-radius:10px;
  padding:12px 18px;
  color:#fff;
  min-width:280px;
}
.row{display:flex;gap:24px;margin-bottom:6px}
.stat{display:flex;flex-direction:column}
.stat .label{font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.stat .value{font-size:28px;font-weight:700;line-height:1.1}
.stat .value.cyan{color:#00D4FF}
.stat .value.green{color:#2ECC71}
.stat .value.yellow{color:#F1C40F}
.stat .value.white{color:#fff}
.stat .value.red{color:#E74C3C}
.stat-sm .value{font-size:18px}
.bottom-row{display:flex;gap:20px;margin-top:2px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.1)}
.done-banner{
  display:none;
  background:rgba(0,212,255,0.15);
  border:1px solid rgba(0,212,255,0.5);
  border-radius:8px;
  padding:8px 14px;
  margin-top:8px;
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:#00D4FF;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="hud">
  <div class="row">
    <div class="stat">
      <span class="label">Hits</span>
      <span class="value green" id="hits">0</span>
    </div>
    <div class="stat">
      <span class="label">Remaining</span>
      <span class="value cyan" id="remaining">30</span>
    </div>
    <div class="stat">
      <span class="label">Time</span>
      <span class="value white" id="timer">0.0s</span>
    </div>
  </div>
  <div class="bottom-row">
    <div class="stat stat-sm">
      <span class="label">Hits / Sec</span>
      <span class="value yellow" id="hps">0.00</span>
    </div>
    <div class="stat stat-sm">
      <span class="label">Avg Time / Hit</span>
      <span class="value yellow" id="avg">-</span>
    </div>
  </div>
  <div class="done-banner" id="done">COMPLETE!</div>
</div>

<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<script>
var startTime = 0;
var hits = 0;
var total = 30;
var started = false;
var finished = false;
var timerInterval = null;

function updateDisplay() {
  var elapsed = started ? (Date.now() - startTime) / 1000 : 0;
  document.getElementById('hits').textContent = hits;
  document.getElementById('remaining').textContent = total - hits;
  if (started && !finished) {
    document.getElementById('timer').textContent = elapsed.toFixed(1) + 's';
  }
  var hps = elapsed > 0 ? hits / elapsed : 0;
  document.getElementById('hps').textContent = hps.toFixed(2);
  var avg = hits > 0 ? elapsed / hits : 0;
  document.getElementById('avg').textContent = hits > 0 ? avg.toFixed(2) + 's' : '-';
  if (hits >= total && !finished) {
    finished = true;
    clearInterval(timerInterval);
    document.getElementById('done').style.display = 'block';
    document.getElementById('done').textContent = 'COMPLETE! ' + elapsed.toFixed(2) + 's';
  }
}

PortalsSdk.setMessageListener(function(message) {
  var msg = message;
  if (typeof message === 'string') {
    try { msg = JSON.parse(message); } catch(e) { msg = message; }
  }
  var s = typeof msg === 'string' ? msg : JSON.stringify(msg);
  if (s.startsWith('hits_')) {
    var val = Number(s.substring(5));
    if (!isNaN(val)) {
      if (!started && val > 0) {
        started = true;
        startTime = Date.now();
        timerInterval = setInterval(updateDisplay, 100);
      }
      hits = val;
      updateDisplay();
    }
  }
});

updateDisplay();
</script>
</body>
</html>
