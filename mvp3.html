<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
  html, body {
    user-select: none;
    -webkit-user-select: none;
    margin: 0; padding: 0;
    background: transparent;
    overflow: hidden;
    width: 100%; height: 100%;
    font-family: 'Inter', sans-serif;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.9), rgba(0,0,0,0.95));
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.8s;
  }
  #overlay.show { opacity: 1; }
  #overlay.hide { opacity: 0; transition: opacity 1s; }
  .round-over {
    font-size: 12px;
    font-weight: 800;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 12px;
  }
  .divider {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
    margin: 12px 0;
  }
  .mvp-label {
    font-size: 44px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255,215,0,0.4), 0 0 60px rgba(255,215,0,0.15);
    letter-spacing: 6px;
  }
  .player-name {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
    margin: 8px 0;
  }
  .kills-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }
  .kills-num {
    font-size: 38px;
    font-weight: 900;
    color: #ff4444;
    text-shadow: 0 0 15px rgba(255,68,68,0.4);
  }
  .kills-label {
    font-size: 13px;
    font-weight: 800;
    color: rgba(255,100,100,0.7);
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  .scoreboard {
    margin-top: 16px;
    text-align: center;
  }
  .scoreboard-title {
    font-size: 10px;
    font-weight: 800;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  .score-entry {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin: 5px 0;
    letter-spacing: 1px;
  }
  .score-entry.mvp-entry { color: #ffd700; }
  .score-name { margin-right: 16px; }
  .score-kills {
    font-weight: 900;
    color: rgba(255,100,100,0.8);
  }
  .score-entry.mvp-entry .score-kills { color: #ff4444; }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .animate-in { animation: slideUp 0.5s ease-out forwards; }
  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div id="loading">Loading results...</div>
  <div id="overlay">
    <div class="round-over">Round Over</div>
    <div class="divider"></div>
    <div class="mvp-label animate-in">MVP</div>
    <div class="player-name animate-in" id="mvpName"></div>
    <div class="kills-row animate-in">
      <div class="kills-num" id="mvpKills">0</div>
      <div class="kills-label">kills</div>
    </div>
    <div class="divider"></div>
    <div class="scoreboard" id="scoreboard">
      <div class="scoreboard-title">Scoreboard</div>
    </div>
  </div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var players = {};
    var teams = {};
    var revealed = false;
    var revealTimer = null;

    function parsePortalsObj(str) {
      var result = {};
      if (!str) return result;
      str = str.replace(/^\{|\}$/g, '').trim();
      if (!str) return result;
      var pairs = str.split(',');
      for (var i = 0; i < pairs.length; i++) {
        var pair = pairs[i].trim();
        var eqIdx = pair.indexOf('=');
        if (eqIdx > -1) {
          var k = pair.substring(0, eqIdx).replace(/^"|"$/g, '').trim();
          var v = pair.substring(eqIdx + 1).replace(/^"|"$/g, '').trim();
          result[k] = v;
        }
      }
      return result;
    }

    function revealMVP() {
      if (revealed) return;
      revealed = true;
      document.getElementById('loading').style.display = 'none';
      var overlay = document.getElementById('overlay');
      var mvpNameEl = document.getElementById('mvpName');
      var mvpKillsEl = document.getElementById('mvpKills');
      var scoreboard = document.getElementById('scoreboard');

      // Filter out players with no team (team = 0 or not set)
      var activePlayers = {};
      for (var name in players) {
        var t = parseInt(teams[name]) || 0;
        if (t > 0) {
          activePlayers[name] = players[name];
        }
      }

      var mvpName = '';
      var mvpKills = -1;
      for (var name in activePlayers) {
        var k = parseInt(activePlayers[name]) || 0;
        if (k > mvpKills) {
          mvpKills = k;
          mvpName = name;
        }
      }
      if (mvpKills < 0) mvpKills = 0;

      mvpNameEl.textContent = mvpName || '?';
      mvpKillsEl.textContent = mvpKills;

      var sorted = [];
      for (var name in activePlayers) {
        sorted.push({ name: name, kills: parseInt(activePlayers[name]) || 0 });
      }
      sorted.sort(function(a, b) { return b.kills - a.kills; });

      for (var i = 0; i < sorted.length; i++) {
        var e = sorted[i];
        var entry = document.createElement('div');
        entry.className = 'score-entry' + (e.name === mvpName ? ' mvp-entry' : '');
        entry.innerHTML = '<span class="score-name">' + e.name + '</span><span class="score-kills">' + e.kills + ' kills</span>';
        scoreboard.appendChild(entry);
      }

      overlay.classList.add('show');

      // Auto-close after 5 seconds
      setTimeout(function() {
        overlay.classList.remove('show');
        overlay.classList.add('hide');
        setTimeout(function() {
          if (typeof PortalsSdk !== 'undefined') {
            PortalsSdk.closeIframe();
          }
        }, 1000);
      }, 5000);
    }

    if (typeof PortalsSdk !== 'undefined') {
      PortalsSdk.setMessageListener(function(message) {
        var msg = typeof message === 'string' ? message : String(message);

        // Format: "kills:{p1=v1,p2=v2},teams:{p1=t1,p2=t2}"
        var killsMatch = msg.match(/kills:\{([^}]*)\}/);
        var teamsMatch = msg.match(/teams:\{([^}]*)\}/);

        if (killsMatch) {
          var killsMap = parsePortalsObj('{' + killsMatch[1] + '}');
          for (var k in killsMap) { players[k] = killsMap[k]; }
        }
        if (teamsMatch) {
          var teamsMap = parsePortalsObj('{' + teamsMatch[1] + '}');
          for (var k in teamsMap) { teams[k] = teamsMap[k]; }
        }

        // Also support old formats
        if (msg.indexOf('mvp:') === 0) {
          var parts = msg.substring(4).split(':');
          if (parts.length >= 2) { players[parts[0]] = parts[1]; }
        }
        if (!killsMatch && !teamsMatch && msg.indexOf('{') === 0) {
          var killsMap = parsePortalsObj(msg);
          for (var k in killsMap) { players[k] = killsMap[k]; }
        }

        if (revealTimer) clearTimeout(revealTimer);
        revealTimer = setTimeout(revealMVP, 1500);
      });
    }

    // Fallback: if no data arrives, show empty and close
    setTimeout(function() { revealMVP(); }, 8000);
  </script>
</body>
</html>
