<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
    font-family: 'Arial', sans-serif;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.8s;
  }
  #overlay.show { opacity: 1; }
  #overlay.hide { opacity: 0; }

  .title {
    font-size: 14px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }
  .mvp-label {
    font-size: 48px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.3);
    margin-bottom: 16px;
  }
  .player-name {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 15px rgba(255,255,255,0.4);
    margin-bottom: 12px;
  }
  .kills-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .kills-num {
    font-size: 42px;
    font-weight: 900;
    color: #ff3333;
    text-shadow: 0 0 10px rgba(255,51,51,0.5);
  }
  .kills-label {
    font-size: 16px;
    color: #ff6666;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    margin: 16px 0;
  }
  .scoreboard {
    margin-top: 20px;
    text-align: center;
  }
  .scoreboard-title {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .score-entry {
    font-size: 16px;
    color: #aaa;
    margin: 4px 0;
  }
  .score-entry.mvp-entry {
    color: #ffd700;
  }
  .score-name { margin-right: 12px; }
  .score-kills { color: #ff6666; font-weight: 900; }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .animate-in {
    animation: slideUp 0.6s ease-out forwards;
  }
</style>
</head>
<body>
  <div id="overlay">
    <div class="title">ROUND OVER</div>
    <div class="divider"></div>
    <div class="mvp-label animate-in">MVP</div>
    <div class="player-name animate-in" id="mvpName">—</div>
    <div class="kills-row animate-in">
      <div class="kills-num" id="mvpKills">0</div>
      <div class="kills-label">kills</div>
    </div>
    <div class="divider"></div>
    <div class="scoreboard" id="scoreboard">
      <div class="scoreboard-title">Scoreboard</div>
    </div>
  </div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var players = {};
    var revealed = false;

    function cleanName(name) {
      return name.replace(/^"|"$/g, '').trim();
    }

    function addPlayer(name, kills) {
      name = cleanName(name);
      if (name && name !== '') {
        players[name] = kills;
      }
    }

    function revealMVP() {
      if (revealed) return;
      revealed = true;

      var overlay = document.getElementById('overlay');
      var mvpNameEl = document.getElementById('mvpName');
      var mvpKillsEl = document.getElementById('mvpKills');
      var scoreboard = document.getElementById('scoreboard');

      var mvpName = '—';
      var mvpKills = 0;
      for (var name in players) {
        if (players[name] > mvpKills || mvpName === '—') {
          mvpKills = players[name];
          mvpName = name;
        }
      }

      mvpNameEl.textContent = mvpName;
      mvpKillsEl.textContent = mvpKills;

      var sorted = Object.keys(players).sort(function(a, b) {
        return players[b] - players[a];
      });

      for (var i = 0; i < sorted.length; i++) {
        var entry = document.createElement('div');
        entry.className = 'score-entry' + (sorted[i] === mvpName ? ' mvp-entry' : '');
        entry.innerHTML = '<span class="score-name">' + sorted[i] + '</span><span class="score-kills">' + players[sorted[i]] + ' kills</span>';
        scoreboard.appendChild(entry);
      }

      overlay.classList.add('show');

      setTimeout(function() {
        overlay.classList.remove('show');
        overlay.classList.add('hide');
        setTimeout(function() {
          if (typeof PortalsSdk !== 'undefined') {
            PortalsSdk.sendMessageToUnity(JSON.stringify({
              TaskName: '12_ShowMVP',
              TaskTargetState: 'SetActiveToCompleted'
            }));
          }
        }, 800);
      }, 5000);
    }

    // Read from URL params
    var params = new URLSearchParams(window.location.search);
    var urlPlayer = params.get('player');
    var urlKills = params.get('kills');

    if (urlPlayer && urlKills !== null) {
      addPlayer(urlPlayer, parseInt(urlKills) || 0);
    }

    // Also listen for messages (for additional players in multiplayer)
    if (typeof PortalsSdk !== 'undefined') {
      PortalsSdk.setMessageListener(function(message) {
        if (message.indexOf('mvpdata:') === 0) {
          var parts = message.substring(8).split(':');
          if (parts.length >= 2) {
            addPlayer(parts[0], parseInt(parts[1]) || 0);
          }
        }
      });
    }

    // Reveal after short delay to collect all data
    setTimeout(revealMVP, 2000);
  </script>
</body>
</html>
