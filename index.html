<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  #timer {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: #00ff88;
    text-shadow:
      0 0 7px #00ff88,
      0 0 20px #00ff88,
      0 0 40px #00cc66,
      0 0 60px #009944;
    text-align: center;
    line-height: 1;
    transition: opacity 0.3s;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }
  .tick {
    animation: pulse 0.3s ease-out;
  }
</style>
</head>
<body>
  <div id="timer">5</div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var timerEl = document.getElementById('timer');
    var total = 5;
    var current = total;

    function tick() {
      current--;
      if (current <= 0) {
        clearInterval(interval);
        timerEl.style.opacity = '0';
        PortalsSdk.sendMessageToUnity(JSON.stringify({
          TaskName: 'Countdown',
          TaskTargetState: 'SetActiveToCompleted'
        }));
        return;
      }

      timerEl.textContent = current;
      timerEl.classList.remove('tick');
      void timerEl.offsetWidth;
      timerEl.classList.add('tick');

      if (current <= 3) {
        timerEl.style.color = '#ff3333';
        timerEl.style.textShadow = '0 0 7px #ff3333, 0 0 20px #ff3333, 0 0 40px #cc0000, 0 0 60px #990000';
      }
    }

    var interval = setInterval(tick, 1000);
  </script>
</body>
</html>
