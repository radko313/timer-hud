<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  #timer {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    text-align: center;
    line-height: 1;
  }
</style>
</head>
<body>
  <div id="timer">15:00</div>

  <script>
    var timerEl = document.getElementById('timer');
    var totalMs = 15 * 1000;
    var start = Date.now();

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function update() {
      var elapsed = Date.now() - start;
      var remaining = Math.max(totalMs - elapsed, 0);
      var secs = Math.floor(remaining / 1000);
      var hundredths = Math.floor((remaining % 1000) / 10);
      timerEl.textContent = secs + ':' + pad(hundredths);
      if (remaining > 0) {
        requestAnimationFrame(update);
      }
    }

    requestAnimationFrame(update);
  </script>
</body>
</html>
