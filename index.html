<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  #timer {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    text-align: center;
    line-height: 1;
  }
</style>
</head>
<body>
  <div id="timer">15</div>

  <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
  <script>
    var timerEl = document.getElementById('timer');

    PortalsSdk.setMessageListener(function(message) {
      var msg = typeof message === 'string' ? message : String(message);

      if (msg.startsWith('time_')) {
        var val = parseFloat(msg.substring(5));
        if (!isNaN(val)) {
          var remaining = Math.ceil(15 - val);
          if (remaining < 0) remaining = 0;
          timerEl.textContent = remaining;
        }
      }
    });
  </script>
</body>
</html>
